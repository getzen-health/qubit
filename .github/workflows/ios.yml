name: Apple Platforms Build

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve packages
        working-directory: ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Quarks.xcodeproj \
            -scheme Quarks

      - name: Build iOS App
        working-directory: ios
        run: |
          xcodebuild build \
            -project Quarks.xcodeproj \
            -scheme Quarks \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Tests
        working-directory: ios
        run: |
          xcodebuild test \
            -project Quarks.xcodeproj \
            -scheme Quarks \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
        continue-on-error: true

  build-macos:
    name: Build macOS App
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve packages
        working-directory: ios
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Quarks.xcodeproj \
            -scheme Quarks

      - name: Build macOS App (Designed for iPad)
        working-directory: ios
        run: |
          xcodebuild build \
            -project Quarks.xcodeproj \
            -scheme Quarks \
            -destination 'platform=macOS,variant=Mac Catalyst' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
        continue-on-error: true

  build-watchos:
    name: Build watchOS App
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build watchOS App
        working-directory: ios
        run: |
          xcodebuild build \
            -project Quarks.xcodeproj \
            -scheme Quarks \
            -destination 'generic/platform=watchOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
        continue-on-error: true

  build-visionos:
    name: Build visionOS App
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build visionOS App
        working-directory: ios
        run: |
          xcodebuild build \
            -project Quarks.xcodeproj \
            -scheme Quarks \
            -destination 'generic/platform=visionOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
        continue-on-error: true

  lint:
    name: Swift Lint
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        working-directory: ios
        run: swiftlint lint --reporter github-actions-logging
        continue-on-error: true
